<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Secure Burn Chat Demo</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/styles.css" integrity="sha384-rL7OsLgtVLFQ68m6gAo2T2S9pdDEgN//Dexb65kkV3EYwE38YhBrazqAfr92UB4u" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <section class="brand">
          <div class="mark" aria-hidden="true">SB</div>
          <div>
            <h1>Secure Burn</h1>
            <p>端到端加密 · 单消息窗口 · 双向确认</p>
          </div>
        </section>

        <section class="panel identity-panel">
          <label for="userId">你的 ID</label>
          <div class="inline-form">
            <input id="userId" maxlength="32" placeholder="例如 alice" autocomplete="off" />
            <button id="startBtn">进入</button>
          </div>
          <p id="connectionState" class="hint">未连接</p>
          <p id="identityFingerprint" class="fingerprint-line">身份指纹：未生成</p>
          <div id="sessionActions" class="session-actions" hidden>
            <button id="logoutBtn" class="secondary-btn" type="button">退出</button>
            <button id="wipeBtn" class="danger-btn" type="button">删除所有记录</button>
          </div>
        </section>

        <section class="panel">
          <div class="section-title">
            <h2>邀请代码</h2>
            <button id="copyInviteBtn" class="icon-btn" title="复制邀请">复制</button>
          </div>
          <textarea id="inviteCode" readonly placeholder="进入后生成邀请代码"></textarea>
        </section>

        <section class="panel">
          <div class="section-title">
            <h2>添加好友</h2>
            <button id="addFriendBtn">添加</button>
          </div>
          <input id="friendId" maxlength="32" placeholder="输入好友 ID，例如 bob" autocomplete="off" />
          <textarea id="friendInvite" placeholder="或粘贴对方邀请代码"></textarea>
        </section>

        <section class="panel friend-panel">
          <div class="section-title compact-title">
            <h2>好友</h2>
            <span id="friendSummary" class="mini-pill">0 位</span>
          </div>
          <div id="friendList" class="friend-list"></div>
        </section>
      </aside>

      <section class="chat">
        <header class="chat-header">
          <div>
            <p class="eyebrow">当前会话</p>
            <h2 id="chatTitle">请选择好友</h2>
            <p id="chatSubtitle" class="chat-subtitle">双方互相添加且在线后才可发送。</p>
          </div>
          <div class="status-pill" id="securityStatus">等待身份密钥</div>
        </header>

        <div id="messages" class="messages"></div>

        <form id="messageForm" class="composer">
          <textarea id="messageInput" placeholder="输入消息，发送前会在浏览器内加密" disabled></textarea>
          <div class="composer-actions">
            <p class="composer-note">单轮次窗口：对方下一条消息会清空你的上一轮消息；最后一条 15 分钟后自动消失。</p>
            <button id="sendBtn" disabled>发送密文</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/app.js" type="module" integrity="sha384-EiNHftCxixEg9DQE91JTp9lx7GiL+FX0AToLICUlXZ+w+fpYqvZCYHBnP9uO2En2"></script>
  </body>
</html>
